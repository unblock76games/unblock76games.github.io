<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="robots" content="noindex,nofollow" />
	<title>Bowling Champion</title>
	<meta charset="utf-8">
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimal-ui">
	<style>
		body {
			margin: 0;
			max-height: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #000000;
			position: relative;
			width: 100%;
		}	

		canvas {	
			-ms-touch-action: none;
			image-rendering: -o-crisp-edges;           
			image-rendering: optimize-contrast;        
			-ms-interpolation-mode: nearest-neighbor;  
			-webkit-tap-highlight-color: rgba(0,0,0,0);
			-moz-tap-highlight-color: rgba(0,0,0,0);
			tap-highlight-color: rgba(0,0,0,0);
			user-select: none;
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
		} 
	</style>
	
<style type="text/css">
		
		@font-face{
		font-family:"BenchNine";
		src:url("Fonts/BenchNine-Regular.ttf") format("truetype");
		}
		
		@font-face{
		font-family:"Bangers";
		src:url("Fonts/Bangers-Regular.ttf") format("truetype");
		}	
	</style>
	
</head>
	<script src="/poki-sdk.js"></script>
	<body> 
		<div id="canvas-wrapper" style="width:100%; height:100%; position:absolute;">
		   <canvas id="canvas" moz-opaque></canvas>
		</div>
	</body>
   
	<script src="gsap.min.js"></script>
	<script src="Howler.min.js"></script>
	<script src="VisibilityManager.js"></script>
	<script src="app.js"></script>
	<script type="text/javascript"> 
		
		PokiSDK.init().then(() => {
			console.log("Poki SDK successfully initialized");
			// fire your function to continue to game
			loadLang("en");
		}).catch(() => {
			console.log("Initialized, something went wrong, load you game anyway");
			// fire your function to continue to game
			loadLang("en");
		});
	</script>
</html>
