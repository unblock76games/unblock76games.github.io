	<style>
		html,
		body {
			overflow: hidden;
			width: 100%;
			height: 100%;
			min-height: 100%;
			max-height: 100%;
			position: absolute;
			top:0;
			left: 0;
			margin: 0;
			padding: 0;
			-webkit-text-size-adjust: none;
			touch-action: pan-x pan-y;
			background: #e8df90;
		}
		/* @media only screen and (orientation:landscape) {
			body {
				transform: rotate(90deg);
			}
		} */
		div.content {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			width: 100%;
			height: 100%;
			margin: auto;
		}
		.flex-row {
			width:80%;
			max-width: 500px;
			display: flex;
			flex-direction: row;
			justify-content: center;
			align-items: center;
			column-gap: 10px;
		}
		.progress {
			width: 100%;
			height: 8vh;
			max-height: 2.8rem;
			margin: 2em auto;
			border: 1px solid #fff;
			padding: 4px 4px;
			box-shadow: 0 0 10px #aaa;
			background-color: black;
		}

		.progress .bar {
			height: 100%;
			width:0;
			background: linear-gradient(gold, #c85, gold);
			background-repeat: repeat;
			box-shadow: 0 0 10px 0px orange;
		}
		.pct {
			font-size: 1.5em;
			font-weight: 600;
			color:#000;
		}
		.logo-container {
			width: 40vh;
			height: 40vh;
			max-width: 260px;
			max-height: 260Px;
		}
		.logo-container img {
			width: 100%;
			height: 100%;
		}
	</style>
	
	<script src="/poki-sdk.js"></script> 
	<!-- <script defer src='bundle.js'></script> -->

<body>
	<div class="content">
		<div class="logo-container">
			<img src="assets/textures/logo2.jpg" alt="xansr logo"/>
		</div>
		<div class="flex-row">
			<div class="progress">
				<div class="bar" id="loading-bar"></div>
			</div>
			<div class="pct" id="loading-pct">

			</div>
		</div>
	</div>
	<script>
		let totalSize = 0;
		let mapSize = 0;
		window.setMapSize = function(amt) {
			totalSize += amt;
		}

		totalSize = 871595 /* bundle js */ + mapSize/*map*/ + 
						  665960 /* hydrant*/ + 123048 /*Trashcan*/+
						  134204 /*phonebooth*/ + 170092 /*Flowerpot3*/+
						  425880/*popper*/+ 330304 /*cycle*/+
						  2264868/*player*/+500000/* extra size to hide postprocessing time*/; 

		const progressDom = document.getElementById("loading-bar");
		const pctDom = document.getElementById("loading-pct");
		let totalLoaded = 0;
		const assetWiseTotalLoaded = new Map();
		window.updateProgress = function(amt,asset) {
			const val = assetWiseTotalLoaded.get(asset);
			if(val) {
				totalLoaded -= val;
			}
			assetWiseTotalLoaded.set(asset, amt);
			totalLoaded += amt;
			//console.log("event progress=" + amt + " total=" + totalLoaded +" totalSize=" + totalSize);
			let pct = ((totalLoaded/totalSize)*100).toFixed(0);
			if(pct > 100) {
				pct = 100;
			}
			progressDom.style.width=`${pct}%`;
			pctDom.innerText = `${pct}%`;
		}
		function loadScript(src, callback) {
			let script = document.createElement('script');
			script.src = src;
			script.onload = () => {
				console.log("loaded " + src);
				callback(871595, src);
			}
			document.head.append(script);
		}
		loadScript('bundle.js',(amt,asset) => window.updateProgress(amt,asset));
	</script>
</body>
