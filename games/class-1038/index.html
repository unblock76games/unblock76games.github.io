    <!-- All margins and padding must be zero for the canvas to fill the screen. -->
	<style type="text/css">
		* {
			padding: 0;
			margin: 0;
		}
		html, body {
			background: #000;
			color: #fff;
			overflow: hidden;
			touch-action: none;
			-ms-touch-action: none;

			touch-action-delay: none;

    <script type="text/javascript">
	function onPageReady()
	{
	  console.log("Page Loaded");
	}

	var pokiSDKReady = false; 
	var isGameLoaded = false;
	var adBlockerEnabled = false;

	PokiSDK.init().then(
	    () => {
	    	pokiSDKReady = true;
	        // successfully initialized
	        PokiSDK.setDebug(false);
	        console.log("PokiSDK initialized");
	        PokiSDK.gameLoadingStart();
	        // continue to game
	    }   
	).catch(
	    () => {
	        // initialized but the user has an adblock
	        console.log("Adblock enabled");
	        pokiSDKReady = true;
	        adBlockerEnabled = true;
	        PokiSDK.setDebug(false);
	        PokiSDK.gameLoadingStart();
	        // feel free to kindly ask the user to disable AdBlock, like forcing weird usernames or showing a sad face; be creative!
	        // continue to the game
	    }   
	);
	function Update_LoadingProgress(progress)
	{
		if(!pokiSDKReady)
			return;
		console.log(progress);
		var data = {};
		data.percentageDone = progress;
		PokiSDK.gameLoadingProgress(data);
	}

	function On_GameStarted()
	{
		console.log("Game Loaded");
		isGameLoaded = true;
		if(pokiSDKReady)
		{
			PokiSDK.gameLoadingFinished();	
		}
	}
	function On_MatchStart() {
		console.log("Match Started");
		if(pokiSDKReady)
			PokiSDK.gameplayStart();
	}
	function On_MatchEnd() {
		console.log("Match Ended");
		if(pokiSDKReady)
			PokiSDK.gameplayStop();
	}
	function Show_Ads()
	{
		console.log("<Poki> Show Ads Called");
		if(pokiSDKReady)
	  	{
	  		if(!adBlockerEnabled)
	  		{
		  		PokiSDK.commercialBreak()
				.then(
				    () => { //you can also use a normal function here
				        console.log('End of commercial break');
				        setTimeout(goToGame,500);
				    }
				)
				.catch(
				    () => {
				        setTimeout(goToGame,500);
				    }   
				);
			}
			else
			{
				setTimeout(goToGame,500);
			}

	  	}
	  	else
	  	{
	  		setTimeout(goToGame,500);
	  	}
	    
	  }
	  function goToGame()
	  {
	  	console.log('Go To Game');
	  	c2_callFunction("On_Ad_Served");
	  }
	  function HappyTime(intensity)
	  {
	  	console.log("Happy Time <" +intensity + ">");
	  	if(pokiSDKReady)
	  	{
	  		PokiSDK.happyTime(intensity);
	  	}
	  }
	  function isAdBlockerEnabled()
	  {
	  	if(adBlockerEnabled)
	  		return 1;
	  	else
	  		return 0;
	  }

	  function WatchRewardedVideoAd()
	  {
	  	PokiSDK.rewardedBreak().then(
	  		() => {
	  			c2_callFunction("On_RewardedAd_Served");
	  			console.log("Video Ad Finished");
	  		}
	  	);

	  }

	  function WatchResumeVideoAd()
	  {
	  	PokiSDK.rewardedBreak().then(
	  		() => {
	  			c2_callFunction("On_ResumeAd_Served");
	  			console.log("Resume Ad Finished");
	  		}
	  	);

	  }

	  function isAdBlockerActive()
	  {
	  	var value  = 0;
	  	if(adBlockerEnabled)
	  		value = 1;
	  	c2_callFunction("On_AdBlocker_Status", [value]);
	  }

	</script>
	

</head>

    <!-- The runtime script.  You can rename it, but don't forget to rename the reference here as well.
    This file will have been minified and obfuscated if you enabled "Minify script" during export. -->
	<script src="c2runtime.js"></script>




    <script>
		// Start the Construct 2 project running on window load.
		jQuery(document).ready(function ()
		{			
			// Create new runtime using the c2canvas
			cr_createRuntime("c2canvas");
		});
		
		// Pause and resume on page becoming visible/invisible
		function onVisibilityChanged() {
			if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
				cr_setSuspended(true);
			else
				cr_setSuspended(false);
		};
		
		document.addEventListener("visibilitychange", onVisibilityChanged, false);
		document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
		
		function OnRegisterSWError(e)
		{
			console.warn("Failed to register service worker: ", e);
		};
		
		// Runtime calls this global method when ready to start caching (i.e. after startup).
		// This registers the service worker which caches resources for offline support.
		window.C2_RegisterSW = function C2_RegisterSW()
		{
			if (!navigator.serviceWorker)
				return;		// no SW support, ignore call
			
			try {
				navigator.serviceWorker.register("sw.js", { scope: "./" })
				.then(function (reg)
				{
					console.log("Registered service worker on " + reg.scope);
				})
				.catch(OnRegisterSWError);
			}
			catch (e)
			{
				OnRegisterSWError(e);
			}
		};
    </script>
