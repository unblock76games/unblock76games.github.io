<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="robots" content="noindex,nofollow" />
	<title>Hit the Fan</title>
	<meta charset="utf-8">
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="viewport" content="initial-scale=1.0,maximum-scale=1.01, minimal-ui" />
	<style>
		body {
			margin: 0px;
			padding: 0px;
			width: 100vw;
			height: 100vh;
			background-color:black;
			overflow:hidden
		}	

		canvas {	
			-ms-touch-action: none;
			image-rendering: -o-crisp-edges;           
			image-rendering: optimize-contrast;        
			-ms-interpolation-mode: nearest-neighbor;  
			-webkit-tap-highlight-color: rgba(0,0,0,0);
			-moz-tap-highlight-color: rgba(0,0,0,0);
			tap-highlight-color: rgba(0,0,0,0);
			user-select: none;
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
		} 
	</style>
	
<style type="text/css">	
		@font-face{
		font-family:"Comrade-Bold";
		src:url("Fonts/Comrade-Bold.ttf") format("truetype");
		}
		
		@font-face{
		font-family:"BebasNeue-Bold";
		src:url("Fonts/BebasNeue-Bold.ttf") format("truetype");
		}
	
	</style>
	
</head>
	<script src="/poki-sdk.js"></script>

		</div>
	</body>
	<script src="seedRandom.js"></script>

			loadLang("en");

			console.log("Initialized, something went wrong, load you game anyway");
			// fire your function to continue to game
			
			loadLang("en");
		});
	</script>
</html>
