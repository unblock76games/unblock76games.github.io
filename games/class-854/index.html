    <script src="/poki-sdk.js"></script>
    <script type="text/javascript">
        (async () => {
            try {
                await PokiSDK.init();
                console.log("Poki SDK successfully initialized");
            } catch {
                console.log("Initialized, something went wrong, loading game anyways");
            }
        })()

        const showAd = async () => {
            Howler.volume(0);
            document.getElementById("connectingCover").style.display = "block";
            await PokiSDK.commercialBreak();
            window.noAdTime = performance.now();
            Howler.volume(1);
        };

        const playOfflineBtnOnClick = async (lvl) => {
            // await showAd();
            window.clickedPlayOffline(lvl);
        };
        const playPVPBtnOnClick = async () => {
            // await showAd();
            window.clickedPlayPVP();
        };
        window.playOfflineBtnOnClick = (lvl) => playOfflineBtnOnClick(lvl);
    </script>
