  <style>
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #21D5DB;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .block1 {
      margin-top: 90px;
      margin-left: 30px;
      margin-right: 30px;
    }

    .block2 {
      margin-top: 60px;
    }

    .spinner-container {
      margin-top: 60px;
      padding: 20px 0 10px;
      margin: auto;
    }

    .spinner {
      display: inline-block;
      width: 100px;
      height: 100px;
    }

    .spinner div {
      width: 20px;
      height: 20px;
      background-color: #ffffff;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.5s infinite ease-in-out;
    }

    .spinner div:nth-child(odd) {
      animation-delay: 0.5s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: scale(0);
      }

      50% {
        transform: scale(1);
      }
    }

    .loading-image {
      max-width: 350px;
      display: flex;
    }

    .loading-image img {
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="loader" class="loader">
    <section class="block1">
      <img src="iload2.png" class="loading-image" width="100%">
      <section class="block2">
        <div class="spinner-container">
          <div class="spinner">
            <div>
            </div>
            <div></div>
            <div></div>
          </div>
        </div>
  </div>

  PokiSDK.gameLoadingStart();
</script>
