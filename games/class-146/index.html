<!DOCTYPE html>
<html lang="en">
<head>
	<title>Speed Pool King</title>
	<meta charset="utf-8">
	<meta name="robots" content="noindex,nofollow" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="viewport" content="initial-scale=1.0,maximum-scale=1.01, minimal-ui" />
	<style>
		body {
			margin: 0px;
			padding: 0px;
			width: 100%;
			background-color:black;
		}	

		canvas {
			-ms-touch-action: none;
			image-rendering: -o-crisp-edges;           
			image-rendering: optimize-contrast;        
			-ms-interpolation-mode: nearest-neighbor;  
			-webkit-tap-highlight-color: rgba(0,0,0,0);
			-moz-tap-highlight-color: rgba(0,0,0,0);
			tap-highlight-color: rgba(0,0,0,0);
			user-select: none;
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
		} 
	</style>
	
</head>
	<script src="/poki-sdk.js"></script>
	<body> 
		<div id="viewporter">
		   <canvas id="canvas" moz-opaque></canvas>
		</div>
	</body>

	<script src="gsap.min.js"></script>
	<script src="howler.min.js"></script>
	<script src="VisibilityManager.js"></script>	
	<script src="app.js"></script>
	<script type="text/javascript"> 
		
		PokiSDK.init().then(() => {
			console.log("Poki SDK successfully initialized");
			// fire your function to continue to game
			loadPreAssets()
		}).catch(() => {
			console.log("Initialized, something went wrong, load you game anyway");
			// fire your function to continue to game
			loadPreAssets()
		});
	</script>
</html>
