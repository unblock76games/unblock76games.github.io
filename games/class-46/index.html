            #game {
                width: 100%;
                height: 100%;
                background-image: url(assets/web/game_background_box.jpg);
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                background-color: #000
            }

            #content {
                display: block;
                width: 100%;
                text-align: center
            }

            #badOrientation,#badOrientationMobile {
                display: none
            }

            #badOrientation {
                position: absolute;
                top: 0;
                width: 100%;
                height: 100%;
                background-image: url(assets/web/portrait_turn.png);
                background-repeat: no-repeat;
                background-position: center;
                background-size: contain;
                background-color: #fff
            }

            @media screen and (orientation: portrait) {
                #badOrientation {
                    display:none
                }

                #game {
                    background-image: none
                }
            }

            @media screen and (orientation: landscape) {
                #badOrientation {
                    display:block
                }

                #game {
                    background-image: url(assets/web/game_background_box.jpg)
                }
            }
