<!DOCTYPE html>
<html lang="en" translate="no" spellcheck="false">

<head>
  <meta charset="UTF-8" />
  <title>Kingdom Heroes</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="manifest" href="./manifest.json">
  <meta name="color-scheme" content="light dark" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, minimal-ui, shrink-to-fit=no, viewport-fit=cover, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Kingdom Heroes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <meta name="description"
    content="Kingdom Heroes is idle game where you have to build up a medieval town and fight with enemies">

  <!-- Facebook Meta Tags -->
  <meta property="og:url" content="https://villagecraft.io">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Kingdom Heroes">
  <meta property="og:description"
    content="Kingdom Heroes is idle game where you have to build up a medieval town and fight with enemies">
  <meta property="og:image"
    content="https://opengraph.b-cdn.net/production/documents/b83b8e16-7b47-4a0d-8e0d-2bad9f115216.jpg?token=IyhLa_jYf7o6LkTyuJvNpI4jCtvG4XaI4wYZiCz13IU&height=500&width=1024&expires=33246064816">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="villagecraft.io">
  <meta property="twitter:url" content="https://villagecraft.io">
  <meta name="twitter:title" content="Kingdom Heroes">
  <meta name="twitter:description"
    content="Kingdom Heroes is idle game where you have to build up a medieval town and fight with enemies">
  <meta name="twitter:image"
    content="https://opengraph.b-cdn.net/production/documents/b83b8e16-7b47-4a0d-8e0d-2bad9f115216.jpg?token=IyhLa_jYf7o6LkTyuJvNpI4jCtvG4XaI4wYZiCz13IU&height=500&width=1024&expires=33246064816">
  <style>
    * {
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }

    /* 1rem=1px */

    html {
      font-size: 1px;
    }

    body,
    html {
      color: #1f2737;
      width: 100%;
      height: 100%;
      min-height: 100%;
      padding: 0;
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    *,
    *:before,
    *:after {
      box-sizing: border-box;
    }

    body {
      position: relative;
      font-size: 16rem;
    }

    button {
      cursor: pointer;
      font-size: inherit;
      font-family: inherit;
      border: none;
      background: #000;
      color: #fff;
      padding: 0;
      outline: none;
    }

    button[disabled] {
      cursor: not-allowed;
    }

    img {
      width: 100%;
      height: 100%;
    }

    a:visited,
    a,
    a:active {
      color: inherit;
    }

    canvas,
    canvas:focus {
      outline: none;
    }

    canvas {
      touch-action: none;
      -ms-touch-action: none;
    }
  </style>
  <style>
    @font-face {
      font-family: 'Segoe UI';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('fonts/segoeuib.woff2') format('woff2'),
        url('fonts/segoeuib.woff') format('woff'),
        url('fonts/segoeuib.ttf') format('truetype');
    }
  </style>
  <style>
    .preloader {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    .preloader h1 {
      font-size: 40rem;
      position: absolute;
      top: 30%;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0;
      margin: 0;
      color: #fafafa;
      text-shadow: 1px 1px rgba(0, 0, 0, 1);
    }

    .preloader .gallery {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background-color: var(--db-color-wood-500);
      background-image: url(images/screen1.jpeg);
      background-repeat: no-repeat;
      background-position: 50% 50%;
      background-size: cover;
    }

    .preloader .loading-bar {
      position: absolute;
      bottom: 8rem;
      left: 50%;
      transform: translate(-50%, 0);
      width: 95%;
      max-width: 800rem;
    }

    .preloader .loading-bar__bg {
      position: relative;
      border-radius: 27rem;
      border: 2rem solid #764C26;
      position: absolute;
      height: 24rem;
      bottom: 0;
      width: calc(100% - 32rem);
      background: #D4AC88;
      margin: 0 16rem;
    }

    .preloader .loading-bar__progress {
      position: absolute;
      left: -2rem;
      top: -2rem;
      bottom: -2rem;
      border-radius: 27rem;
      border: 2rem solid #174B67;
      min-width: 99%;
      width: 0%;
      background: #58B1E2;
      animation: loading-anim 60s;
    }

    @keyframes loading-anim {
      0% {
        min-width: 5%;
      }

      50% {
        min-width: 80%;
      }

      100% {
        min-width: 99%;
      }
    }

    .global-error-message {
      display: none;
      position: absolute;
      padding: 16rem;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
    }

    .no-connection {
      display: flex;
      visibility: hidden;
      align-items: center;
      position: absolute;
      padding: 8rem;
      left: 50%;
      top: -50rem;
      transform: translate(-50%, 0);
      background-color: #f65c5c;
      border: 2rem solid #c83434;
      border-bottom-left-radius: 8rem;
      border-bottom-right-radius: 8rem;
      border-bottom-width: 4rem;
      transition: top 1s;
    }

    .no-connection.visible {
      visibility: visible;
      top: -4rem;
    }

    .no-connection h3 {
      font-size: 18rem;
      padding: 0;
      margin: 0;
      color: #fafafa;
    }

    .no-connection .no-connection-icon {
      width: 24rem;
      height: 24rem;
      background-image: url("./assets/icon_no_connection-Cx7HlH8S.png");
      background-repeat: no-repeat;
      background-size: contain;
    }
  </style>
  <link rel="prefetch" href="./assets/transparent-a7kTsvnY.png" as="image">
  <link rel="prefetch" href="./assets/zVillage_heightmap-Dliv_ItX.png" as="image">
  <link rel="preconnect" href="//api.poki.com">
  <link rel="preconnect" href="//imasdk.googleapis.com">
  <link rel="preconnect" href="//securepubads.g.doubleclick.net">
  <script>
    const min = 0.6;
    const max = 0.8;
    const fontSize = Math.min(Math.max(window.innerHeight / 1080, min), max);
    document.documentElement.style.fontSize = fontSize + 'px';
    var APP_CONNECTION_TOAST = {
      show: () => {
        const connectionToastElement = document.querySelector(".no-connection");
        if (!connectionToastElement) return;

        if (!connectionToastElement.classList.contains('visible')) {
          connectionToastElement.classList.add('visible');
        }
      },
      hide: () => {
        const connectionToastElement = document.querySelector(".no-connection");
        if (!connectionToastElement) return;
        connectionToastElement.classList.remove('visible');
      }
    };

    const planReload = () => {
      setTimeout(() => {
        console.log(`on reload:`, navigator.onLine);

        if (navigator.onLine) {
          location.reload();
        } else {
          planReload();
        }
      }, 3000);
    };

    var _onScriptFailed = function () {
      console.log(`on script failed:`, this);
      APP_CONNECTION_TOAST.show();

      const src = this.src;

      if (src && typeof src === 'string' && src.indexOf("/index") >= 0) {
        planReload();
      }
    };
  </script>
  <script>
    window.__vcStopwatches = [Date.now()];

    // fix SecurityError for getGamepads
    try {
      navigator.getGamepads = null;
    } catch (e) {
    }
  </script>
  <script src="/poki-sdk.js"></script>
  <script>
    window.__vcStopwatches && window.__vcStopwatches.push(Date.now()); // [1]
  </script>
  <script defer src="./js/GameAnalytics_v1.js" onload="_updateProgress(2);"></script>
  <script type="module" crossorigin src="./assets/index-DzmKKICp.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-BUE0VxBy.css">
</head>

<body>
  <canvas class="game-canvas" width="400" height="300"></canvas>
  <div id="react-target"></div>
  <div class="preloader">
    <div class="gallery"></div>
    <h1>Kingdom Heroes</h1>
    <div class="loading-bar">
      <div class="loading-bar__bg">
        <div class="loading-bar__progress"></div>
      </div>
    </div>
    <div style="position: absolute;">
      <h1 style="color: red;"></h1>
    </div>
  </div>
  <h1 class="global-error-message">Sorry, we can't launch the game in your browser. Try to update it.</h1>
  <div class="no-connection">
    <div class="no-connection-icon"></div>
    <h3>Check your internet connection!</h3>
  </div>
  <script>
    this._updateProgress = (ind) => {
      if (ind) {
        window.__vcStopwatches && (window.__vcStopwatches[ind] = Date.now());
      }
    };
  </script>
  <script>
    setTimeout(() => {
      document.querySelectorAll('script[src]:not([src^=http])').forEach(node => {
        node.onerror = _onScriptFailed;
      });
    }, 0);
  </script>
</body>

</html>
